<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head(${category.name})}"></head>
<body style="background:var(--surface);min-height:100vh;">

<div th:replace="~{fragments/nav :: nav}"></div>

<div style="max-width:900px;margin:0 auto;padding:40px 24px;">

  <!-- Header -->
  <div style="margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--surface-border);">
    <a href="/topics"
       style="font-size:12px;color:var(--ink-tertiary);text-decoration:none;display:inline-block;margin-bottom:12px;">
      ← All topics
    </a>
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="tag"
            th:classappend="${'tag-' + category.slug}"
            th:text="${category.name}"
            th:style="${category.colorHex != null ?
                'color:' + category.colorHex + ';background:' + (category.bgHex ?: 'rgba(90,90,90,.12)') + ';font-size:12px;' : 'font-size:12px;'}">
        Topic
      </span>
    </div>
    <h1 class="serif"
        style="font-size:2rem;font-weight:700;margin:10px 0 6px;"
        th:text="${category.name}">
      Category
    </h1>
    <p th:if="${category.description}"
       th:text="${category.description}"
       style="font-size:14px;color:var(--ink-secondary);line-height:1.55;margin:0;">
    </p>
  </div>

  <!-- Empty state -->
  <div th:if="${posts.empty}"
       style="text-align:center;padding:64px 0;color:var(--ink-tertiary);font-size:14px;">
    No published posts in this topic yet — check back soon.
  </div>

  <!-- Post list -->
  <div style="display:flex;flex-direction:column;gap:0;">
    <a th:each="post : ${posts.content}"
       th:href="@{/articles/{slug}(slug=${post.slug})}"
       style="text-decoration:none;display:flex;align-items:flex-start;gap:16px;
              padding:18px 0;border-bottom:1px solid var(--surface-border);"
       class="card-hover">

      <!-- Cover thumbnail -->
      <div th:if="${post.coverImageUrl != null}"
           style="flex-shrink:0;width:80px;height:60px;border-radius:8px;overflow:hidden;">
        <img th:src="${post.coverImageUrl}"
             th:alt="${post.title}"
             style="width:100%;height:100%;object-fit:cover;"/>
      </div>

      <div style="flex:1;min-width:0;">
        <h2 class="serif"
            style="font-size:15px;font-weight:600;line-height:1.35;
                   margin:0 0 6px;color:var(--ink-primary);"
            th:text="${post.title}">
          Post title
        </h2>
        <p th:if="${post.subtitle}"
           th:text="${post.subtitle}"
           style="font-size:13px;color:var(--ink-secondary);line-height:1.5;margin:0 0 8px;
                  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
        </p>
        <div style="font-size:11px;color:var(--ink-tertiary);display:flex;align-items:center;gap:8px;">
          <span th:text="${post.author.displayName}">Author</span>
          <span>·</span>
          <span th:text="${post.publishedAtFormatted}">Jan 1</span>
          <span th:if="${post.estimatedReadMinutes > 0}">·</span>
          <span th:if="${post.estimatedReadMinutes > 0}"
                th:text="${post.estimatedReadMinutes + ' min read'}">5 min read</span>
        </div>
      </div>
    </a>
  </div>

  <!-- Pagination -->
  <div th:if="${posts.totalPages > 1}"
       style="display:flex;justify-content:space-between;align-items:center;
              margin-top:32px;font-size:13px;">
    <a th:if="${currentPage > 0}"
       th:href="@{/topics/{slug}(slug=${category.slug}, page=${currentPage - 1})}"
       style="color:var(--brand);text-decoration:none;">← Newer</a>
    <span th:unless="${currentPage > 0}"></span>

    <span style="color:var(--ink-tertiary);">
      Page <span th:text="${currentPage + 1}">1</span> of
      <span th:text="${posts.totalPages}">1</span>
    </span>

    <a th:if="${!posts.last}"
       th:href="@{/topics/{slug}(slug=${category.slug}, page=${currentPage + 1})}"
       style="color:var(--brand);text-decoration:none;">Older →</a>
    <span th:if="${posts.last}"></span>
  </div>

</div>

<footer style="padding:24px;text-align:center;color:var(--ink-tertiary);font-size:12px;
               border-top:1px solid var(--surface-border);margin-top:40px;">
  <span>© 2026 The Byline.</span>
  <a href="/about"        style="color:var(--ink-tertiary);text-decoration:none;margin:0 12px;">About</a>
  <a href="/rss/feed.xml" style="color:var(--ink-tertiary);text-decoration:none;">RSS</a>
</footer>

</body>
</html>
