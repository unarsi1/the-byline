<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Topics')}"></head>
<body style="background:var(--surface);min-height:100vh;">

<div th:replace="~{fragments/nav :: nav}"></div>

<div style="max-width:1200px;margin:0 auto;padding:40px 24px;">

  <h1 class="serif" style="font-size:2rem;font-weight:700;margin-bottom:8px;">Topics</h1>
  <p style="font-size:14px;color:var(--ink-secondary);margin-bottom:36px;">
    Browse everything we cover at The Byline.
  </p>

  <!-- Empty state -->
  <div th:if="${categories.empty}"
       style="text-align:center;padding:64px 0;color:var(--ink-tertiary);font-size:14px;">
    No topics yet — check back soon.
  </div>

  <!-- Category grid -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;">
    <a th:each="cat : ${categories}"
       th:href="@{/topics/{slug}(slug=${cat.slug})}"
       style="text-decoration:none;display:block;padding:24px;border-radius:12px;
              border:1px solid var(--surface-border);transition:border-color .15s;"
       class="card-hover">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <span class="tag"
              th:classappend="${'tag-' + cat.slug}"
              th:text="${cat.name}"
              th:style="${cat.colorHex != null ? 'color:' + cat.colorHex + ';background:' + (cat.bgHex != null ? cat.bgHex : 'rgba(90,90,90,.12)') + ';' : ''}">
          Topic
        </span>
      </div>
      <p th:if="${cat.description}"
         th:text="${cat.description}"
         style="font-size:13px;color:var(--ink-secondary);line-height:1.55;margin:0;">
      </p>
    </a>
  </div>

</div>

<footer style="padding:24px;text-align:center;color:var(--ink-tertiary);font-size:12px;
               border-top:1px solid var(--surface-border);margin-top:0;">
  <span>© 2026 The Byline.</span>
  <a href="/about"        style="color:var(--ink-tertiary);text-decoration:none;margin:0 12px;">About</a>
  <a href="/rss/feed.xml" style="color:var(--ink-tertiary);text-decoration:none;">RSS</a>
</footer>

</body>
</html>
