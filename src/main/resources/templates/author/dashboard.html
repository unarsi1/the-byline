<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Dashboard')}"></head>
<body style="background:var(--surface);min-height:100vh;">

<div th:replace="~{fragments/nav :: nav}"></div>

<div style="max-width:1000px;margin:0 auto;padding:36px 24px 80px;">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;">
    <div>
      <h1 class="serif" style="font-size:1.8rem;font-weight:700;margin-bottom:4px;">My Dashboard</h1>
      <p style="font-size:13px;color:var(--ink-secondary);"
         th:text="${'Signed in as ' + user.displayName + ' · ' + #strings.toLowerCase(user.role.name())}">
        Signed in as Author
      </p>
    </div>
    <a href="/author/posts/new"
       style="font-size:13px;font-weight:500;padding:10px 20px;border-radius:8px;
              background:var(--brand);color:#fff;text-decoration:none;">
      + New post
    </a>
  </div>

  <!-- Flash message -->
  <div th:if="${success}"
       style="background:rgba(29,158,117,.12);border:1px solid rgba(29,158,117,.3);
              border-radius:8px;padding:12px 16px;margin-bottom:20px;
              font-size:13px;color:#1D9E75;"
       th:text="${success}">
  </div>

  <!-- Empty state -->
  <div th:if="${posts.empty}"
       style="text-align:center;padding:64px 0;color:var(--ink-tertiary);font-size:14px;">
    <p>No posts yet.</p>
    <a href="/author/posts/new"
       style="color:var(--brand);text-decoration:none;font-size:13px;">Write your first post →</a>
  </div>

  <!-- Posts table -->
  <div th:unless="${posts.empty}"
       style="border:1px solid var(--surface-border);border-radius:12px;overflow:hidden;">
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <thead>
        <tr style="background:var(--surface-raised);border-bottom:1px solid var(--surface-border);">
          <th style="text-align:left;padding:12px 16px;font-weight:600;color:var(--ink-secondary);">Title</th>
          <th style="text-align:left;padding:12px 16px;font-weight:600;color:var(--ink-secondary);width:110px;">Status</th>
          <th style="text-align:left;padding:12px 16px;font-weight:600;color:var(--ink-secondary);width:90px;">Published</th>
          <th style="text-align:right;padding:12px 16px;font-weight:600;color:var(--ink-secondary);width:50px;">Views</th>
          <th style="padding:12px 16px;width:100px;"></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="post, i : ${posts.content}"
            th:style="${i.odd ? 'background:var(--surface-raised)' : ''}">
          <td style="padding:12px 16px;">
            <span style="font-weight:500;color:var(--ink-primary);" th:text="${post.title}">Title</span>
            <span th:if="${post.subtitle}"
                  style="display:block;font-size:11px;color:var(--ink-tertiary);margin-top:2px;"
                  th:text="${#strings.abbreviate(post.subtitle,70)}"></span>
          </td>
          <td style="padding:12px 16px;">
            <span th:text="${#strings.toLowerCase(post.status.name())}"
                  th:style="${post.status.name() == 'PUBLISHED' ? 'color:#1D9E75;font-weight:600;' :
                              post.status.name() == 'IN_REVIEW'  ? 'color:#D4537E;font-weight:600;' :
                              post.status.name() == 'DRAFT'      ? 'color:var(--ink-tertiary);' :
                              'color:var(--ink-secondary);'}"
                  style="font-size:12px;">
              draft
            </span>
          </td>
          <td style="padding:12px 16px;color:var(--ink-tertiary);"
              th:text="${post.publishedAtFormatted ?: '—'}">—</td>
          <td style="padding:12px 16px;text-align:right;color:var(--ink-tertiary);"
              th:text="${post.viewCount}">0</td>
          <td style="padding:12px 16px;text-align:right;">
            <a th:href="@{/author/posts/{id}/edit(id=${post.id})}"
               style="font-size:12px;color:var(--brand);text-decoration:none;margin-right:10px;">Edit</a>
            <form th:action="@{/author/posts/{id}/delete(id=${post.id})}"
                  method="post" style="display:inline;"
                  onsubmit="return confirm('Delete this post?')">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit"
                      style="font-size:12px;color:#D4537E;background:none;border:none;
                             cursor:pointer;font-family:'Inter',sans-serif;padding:0;">
                Delete
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div th:if="${posts.totalPages > 1}"
       style="display:flex;justify-content:space-between;margin-top:20px;font-size:13px;">
    <a th:if="${currentPage > 0}" th:href="@{/author/dashboard(page=${currentPage-1})}"
       style="color:var(--brand);text-decoration:none;">← Newer</a>
    <span th:unless="${currentPage > 0}"></span>
    <span style="color:var(--ink-tertiary);">
      Page <span th:text="${currentPage+1}">1</span> of <span th:text="${posts.totalPages}">1</span>
    </span>
    <a th:if="${!posts.last}" th:href="@{/author/dashboard(page=${currentPage+1})}"
       style="color:var(--brand);text-decoration:none;">Older →</a>
    <span th:if="${posts.last}"></span>
  </div>

</div>
</body>
</html>
