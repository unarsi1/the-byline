<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head(${editing ? 'Edit Post' : 'New Post'})}"></head>
<body style="background:var(--surface);min-height:100vh;">

<div th:replace="~{fragments/nav :: nav}"></div>

<div style="max-width:800px;margin:0 auto;padding:36px 24px 80px;">

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px;">
    <a href="/author/dashboard"
       style="font-size:13px;color:var(--ink-tertiary);text-decoration:none;">← Dashboard</a>
    <span style="color:var(--surface-border);">/</span>
    <h1 class="serif" style="font-size:1.5rem;font-weight:700;margin:0;"
        th:text="${editing ? 'Edit post' : 'New post'}">New post</h1>
  </div>

  <!-- Error -->
  <div th:if="${error}"
       style="background:rgba(212,83,126,.12);border:1px solid rgba(212,83,126,.3);
              border-radius:8px;padding:12px 16px;margin-bottom:20px;
              font-size:13px;color:#E07FAA;"
       th:text="${error}">
  </div>

  <form th:action="${editing ? '/author/posts/' + post.id + '/edit' : '/author/posts/new'}"
        method="post"
        style="display:flex;flex-direction:column;gap:20px;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <!-- Title -->
    <div>
      <label style="font-size:12px;font-weight:600;color:var(--ink-secondary);
                    display:block;margin-bottom:6px;">Title *</label>
      <input type="text" name="title" required
             th:value="${post.title}"
             placeholder="Your post title"
             style="width:100%;font-size:20px;font-weight:600;padding:10px 14px;
                    border:1px solid var(--surface-border);border-radius:8px;
                    background:var(--surface-raised);color:var(--ink-primary);
                    font-family:'Inter',sans-serif;box-sizing:border-box;"/>
    </div>

    <!-- Subtitle -->
    <div>
      <label style="font-size:12px;font-weight:600;color:var(--ink-secondary);
                    display:block;margin-bottom:6px;">Subtitle / deck</label>
      <input type="text" name="subtitle"
             th:value="${post.subtitle}"
             placeholder="A short summary shown under the title"
             style="width:100%;font-size:14px;padding:10px 14px;
                    border:1px solid var(--surface-border);border-radius:8px;
                    background:var(--surface-raised);color:var(--ink-primary);
                    font-family:'Inter',sans-serif;box-sizing:border-box;"/>
    </div>

    <!-- Body -->
    <div>
      <label style="font-size:12px;font-weight:600;color:var(--ink-secondary);
                    display:block;margin-bottom:6px;">Content (HTML)</label>
      <textarea name="bodyHtml" rows="18"
                placeholder="Write your post content here… HTML is supported."
                style="width:100%;font-size:14px;padding:12px 14px;
                       border:1px solid var(--surface-border);border-radius:8px;
                       background:var(--surface-raised);color:var(--ink-primary);
                       font-family:'Inter',sans-serif;box-sizing:border-box;
                       resize:vertical;line-height:1.6;"
                th:text="${post.bodyHtml}"></textarea>
    </div>

    <!-- Category + Status row -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div>
        <label style="font-size:12px;font-weight:600;color:var(--ink-secondary);
                      display:block;margin-bottom:6px;">Category</label>
        <select name="categoryId"
                style="width:100%;font-size:14px;padding:10px 14px;
                       border:1px solid var(--surface-border);border-radius:8px;
                       background:var(--surface-raised);color:var(--ink-primary);
                       font-family:'Inter',sans-serif;">
          <option value="">— No category —</option>
          <option th:each="cat : ${categories}"
                  th:value="${cat.id}"
                  th:text="${cat.name}"
                  th:selected="${post.category != null and post.category.id == cat.id}">
            Category
          </option>
        </select>
      </div>
      <div>
        <label style="font-size:12px;font-weight:600;color:var(--ink-secondary);
                      display:block;margin-bottom:6px;">Status</label>
        <select name="status"
                style="width:100%;font-size:14px;padding:10px 14px;
                       border:1px solid var(--surface-border);border-radius:8px;
                       background:var(--surface-raised);color:var(--ink-primary);
                       font-family:'Inter',sans-serif;">
          <option th:each="s : ${statuses}"
                  th:value="${s.name()}"
                  th:text="${#strings.toLowerCase(s.name())}"
                  th:selected="${post.status != null and post.status == s}">
            draft
          </option>
        </select>
      </div>
    </div>

    <!-- Actions -->
    <div style="display:flex;gap:12px;padding-top:8px;">
      <button type="submit"
              style="font-size:14px;font-weight:500;padding:11px 24px;border-radius:8px;
                     background:var(--brand);color:#fff;border:none;
                     cursor:pointer;font-family:'Inter',sans-serif;"
              th:text="${editing ? 'Save changes' : 'Create post'}">
        Create post
      </button>
      <a href="/author/dashboard"
         style="font-size:14px;padding:11px 20px;border-radius:8px;
                border:1px solid var(--surface-border);color:var(--ink-secondary);
                text-decoration:none;">
        Cancel
      </a>
    </div>
  </form>
</div>
</body>
</html>
